<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="/todo-app/assests/todo-logo.png"
    />
    <link rel="stylesheet" href="/todo-app/style.css" />
    <title>Todo App</title>
  </head>
  <body>
    <center>Todo Application</center>
    <div class="todo-app-topContainer">
      <input type="text" placeholder="Todo Title" />
      <input type="text" placeholder="Description" />
      <button>Create Todo</button>
    </div>
    <div class="toto-app-bottomContainer">
      <table>
        <thead>
          <tr>
            <th>""</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="checkbox" /></td>
            <td>Wakeup</td>
            <td></td>
            <td>completed</td>
            <td>update, delete</td>
          </tr>
          <tr>
            <td><input type="checkbox" /></td>
            <td>Work out</td>
            <td></td>
            <td>Pending</td>
            <td>update, delete</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
